services:
  - type: web
    name: zapp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: SECRET_KEY
        value: changeme123
      - key: FLASK_APP
        value: app.py
